name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Add QEMU to emulate different CPU architectures
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Add Buildx to handle the multi-platform build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build for ARM64 (Raspberry Pi) and AMD64 (Standard PCs)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # This is the magic line that fixes your error
          platforms: linux/amd64,linux/arm64 
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my-personal-website:latest